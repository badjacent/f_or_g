name: Deploy Lambda

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-lambda.yml"
      - "infra/terraform/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      LAMBDA_FUNCTION_NAME: f-or-g-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build deployment package
        run: |
          set -euo pipefail
          rm -rf backend/build
          mkdir -p backend/build/package
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -t backend/build/package
          cp -R backend/app backend/build/package/app
          cp backend/lambda_handler.py backend/build/package/lambda_handler.py
          cd backend/build/package
          zip -r ../function.zip .

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --zip-file "fileb://backend/build/function.zip" \
            --publish
